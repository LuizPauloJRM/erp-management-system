<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD MathML 3.0//EN" "http://www.w3.org/Math/DTD/mathml3/mathml3.dtd">
<ui:composition xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	template="/templates/layout.xhtml">
	<ui:define name="content">
		


        <h:form>

            <p:panel header="Configurações do Sistema">

                <!-- TABS -->
                <div style="display:flex; gap:10px; margin-bottom:15px;">

                    <button type="button" class="tab-btn active" onclick="trocarTab('perfil')">
                        Perfil
                    </button>

                    <button type="button" class="tab-btn" onclick="trocarTab('seguranca')">
                        Segurança
                    </button>

                    <button type="button" class="tab-btn" onclick="trocarTab('preferencias')">
                        Preferências
                    </button>

                </div>

                <!-- CONTEÚDO -->
                <div id="perfil" class="tab-content active">
                    <p:panel header="Perfil">

                        <h:panelGrid columns="2" cellpadding="5">
                            <h:outputLabel value="Nome:" />
                            <p:inputText />

                            <h:outputLabel value="Email:" />
                            <p:inputText />
                        </h:panelGrid>

                    </p:panel>
                </div>

                <div id="seguranca" class="tab-content">
                    <p:panel header="Segurança">

                        <h:panelGrid columns="2" cellpadding="5">
                            <h:outputLabel value="Nova Senha:" />
                            <p:password />

                            <h:outputLabel value="Confirmar Senha:" />
                            <p:password />
                        </h:panelGrid>

                    </p:panel>
                </div>

                <div id="preferencias" class="tab-content">
                    <p:panel header="Preferências">

                        <h:panelGrid columns="2" cellpadding="5">
                            <h:outputLabel value="Modo Escuro:" />
                            <p:selectBooleanCheckbox />

                            <h:outputLabel value="Notificações:" />
                            <p:selectBooleanCheckbox />
                        </h:panelGrid>

                    </p:panel>
                </div>

            </p:panel>

        </h:form>

        <!-- SCRIPT -->
        <script>
            function trocarTab(tabId) {

                // Esconde todos os conteúdos
                document.querySelectorAll('.tab-content').forEach(el => {
                    el.classList.remove('active');
                });

                // Remove destaque dos botões
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('active');
                });

                // Mostra o selecionado
                document.getElementById(tabId).classList.add('active');

                // Ativa botão clicado
                event.target.classList.add('active');
            }
        </script>

        <!-- ESTILO -->
        <style>
            .tab-btn {
                padding: 10px 15px;
                border: none;
                background: #e0e0e0;
                cursor: pointer;
                border-radius: 5px;
            }

            .tab-btn.active {
                background: #f57c00;
                color: white;
            }

            .tab-content {
                display: none;
                margin-top: 10px;
            }

            .tab-content.active {
                display: block;
            }
        </style>


	
	</ui:define>
</ui:composition>
