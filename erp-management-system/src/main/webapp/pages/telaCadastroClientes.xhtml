<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<ui:composition template="/templates/layout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

<!-- http://localhost:8080/erp-management-system/pages/telaCadastroClientes.xhtml -->
<ui:define name="content">
    <h:form id="formCadastro">
        <!-- HEADER ESTILIZADO -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Cadastro de Cliente <small style="color: #666;">| Nº: 0</small></h2>
            <p:commandButton value="Salvar" icon="pi pi-save" styleClass="ui-button-success" />
        </div>

        <p:panel header="Dados Pessoais / Empresariais">
            <div class="ui-fluid">
                <!-- LINHA 1: Nome e CPF/CNPJ -->
                <p:panelGrid columns="4" layout="grid" columnClasses="ui-grid-col-2,ui-grid-col-4,ui-grid-col-2,ui-grid-col-4" styleClass="ui-panelgrid-blank">
                    
                    <p:outputLabel value="Nome:" />
                    <p:inputText placeholder="Nome completo ou Razão Social" />

                    <p:outputLabel value="CPF/CNPJ:" />
                    <p:inputText placeholder="000.000.000-00" />
                </p:panelGrid>

                <!-- LINHA 2: Inscrições e RG -->
                <p:panelGrid columns="4" layout="grid" columnClasses="ui-grid-col-2,ui-grid-col-4,ui-grid-col-2,ui-grid-col-4" styleClass="ui-panelgrid-blank">
                    
                    <p:outputLabel value="RG / Inscr. Est.:" />
                    <p:inputText />

                    <p:outputLabel value="Inscr. Municipal:" />
                    <p:inputText />
                </p:panelGrid>

                <!-- LINHA 3: E-mail e Nascimento -->
                <p:panelGrid columns="4" layout="grid" columnClasses="ui-grid-col-2,ui-grid-col-4,ui-grid-col-2,ui-grid-col-4" styleClass="ui-panelgrid-blank">
                    
                    <p:outputLabel value="E-mail:" />
                    <p:inputText placeholder="exemplo@email.com" />

                    <p:outputLabel value="Nascimento:" />
                    <p:datePicker pattern="dd/MM/yyyy" showIcon="true" />
                </p:panelGrid>

                <!-- LINHA 4: Switches (Isento/Ativo) -->
                <p:panelGrid columns="4" layout="grid" columnClasses="ui-grid-col-2,ui-grid-col-2,ui-grid-col-2,ui-grid-col-2" styleClass="ui-panelgrid-blank">
                    
                    <p:outputLabel value="Isento:" />
                    <p:inputSwitch />

                    <p:outputLabel value="Ativo:" />
                    <p:inputSwitch />
                </p:panelGrid>
            </div>
        </p:panel>

        <!-- BOTÕES DE AÇÃO NO RODAPÉ -->
        <div style="margin-top: 20px;">
            <p:commandButton value="Salvar Cliente" icon="pi pi-check" style="width: auto; padding: 5px 20px;" />
            <p:spacer width="10" />
            <p:commandButton value="Cancelar" icon="pi pi-times" styleClass="ui-button-secondary" style="width: auto;" />
        </div>
    </h:form>
</ui:define>

</ui:composition>
